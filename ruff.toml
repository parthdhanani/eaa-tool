# Ruff hygiene gate. Docs: https://docs.astral.sh/ruff/
target-version = "py310"
line-length = 120

[lint]
# E/W = pycodestyle, F = pyflakes (unused imports, undefined names, dead code),
# I = import sorting. E501 (line length) is left to the formatter, not this gate.
select = ["E", "W", "F", "I"]
ignore = ["E501"]
